<!DOCTYPE html>
<!-- GIAO DIỆN DANH SÁCH BÀI HỌC THEO TỪNG SECTION -->
<!-- Chứa thanh Search và danh sách lồng Accordion đóng/mở -->

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${category.name})}"></head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container" style="flex: 1; padding-top: 30px; padding-bottom: 100px;">
        <!-- Breadcrumb -->
        <div class="breadcrumb" style="margin-bottom: 20px; font-size: 0.95rem; color: #6b7280;">
            <a th:href="@{/exercises}" style="color: #1a73e8; text-decoration: none;">All topics</a>
            <span style="margin: 0 8px;">/</span>
            <span th:text="${category.name}" style="color: #1a1a1a;">Category Name</span>
        </div>

        <!-- Header Row: Title & Search -->
        <div class="page-header-row">
            <h1 class="page-title" th:text="${category.name}">Category Name</h1>

            <!-- Search & Filter Component -->
            <div class="search-filter-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search lessons...">
                <select id="levelFilter" class="level-select">
                    <option value="All levels">All levels</option>
                    <option th:each="lvl : ${levels}" th:value="${lvl}" th:text="${lvl}"></option>
                </select>
            </div>
        </div>

        <!-- Vòng lặp các Section -->
        <div class="section-group" th:each="dto, iterStat : ${sections}">
            
            <!-- Accordion Header -->
            <div class="section-header collapsed" onclick="toggleSection(this)">
                <h2 class="section-title">
                    <span th:text="${dto.section.name}">Section 1</span>
                    <span class="lesson-count" th:text="'(' + ${dto.lessons.size()} + ' lessons)'">(11 lessons)</span>
                </h2>
                <span class="toggle-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </span>
            </div>

            <!-- Accordion Body (Các Lesson) -->
            <div class="lessons-grid" style="display: none;">
                <a th:href="@{'/lesson/' + ${lesson.id}}" class="lesson-card" th:each="lesson : ${dto.lessons}" th:attr="data-level=${lesson.level}">
                    <h3 class="lesson-title" th:text="${lesson.title}">1. First snowfall</h3>
                    <p class="lesson-meta" th:text="${lesson.totalSentences} + ' parts - Vocab level: ' + ${lesson.level}">21 parts - Vocab level: A1</p>
                </a>
            </div>
            
        </div>

        <!-- No Results Message -->
        <div id="noResultsMsg" style="display: none; text-align: center; padding: 40px 20px; color: #6b7280; font-size: 1.1rem; background: #fff; border: 1px dashed #dcdcdc; border-radius: 8px;">
            No lessons match your search criteria.
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="/js/sections-filter.js?v=1.1"></script>
</body>
</html>
