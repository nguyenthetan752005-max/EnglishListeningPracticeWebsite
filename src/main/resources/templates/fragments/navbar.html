<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar">
    <div class="navbar-container">
        <!-- Logo -->
        <a href="/" class="navbar-brand">
            <span class="brand-icon">🎧</span>
            <span class="brand-text">EnglishListening</span>
        </a>

        <!-- Nav Links (Desktop) -->
        <ul class="nav-links">
            <li><a href="/exercises" class="nav-link">All exercises</a></li>
            <li><a href="/top-users" class="nav-link">Top users</a></li>
        </ul>

        <!-- Right Section -->
        <div class="nav-right">
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                <img class="icon-sun" th:src="@{/images/mode/sun.png}" alt="Light Mode" width="20" height="20">
                <img class="icon-moon" th:src="@{/images/mode/moon.png}" alt="Dark Mode" width="20" height="20" style="display: none;">
            </button>
            
            <a href="/login" class="nav-link btn-login">Login</a>
            <a href="/register" class="nav-link">Register</a>
        </div>

        <!-- Mobile Menu Toggle -->
        <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="/exercises" class="mobile-link">All exercises</a>
        <a href="/top-users" class="mobile-link">Top users</a>
        <div class="mobile-auth">
            <a href="/login" class="mobile-link">Login</a>
            <a href="/register" class="mobile-link">Register</a>
        </div>
    </div>
</nav>
</body>
</html>
