<!DOCTYPE html>
<!-- FRAGMENT CẮT RỜI: THẺ <HEAD> DÙNG CHUNG -->
<!-- Chứa link FontAwesome, Google Fonts, nhúng file style.css để không phải viết lại nhiều lần -->

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" th:attr="content=${appSeoMetaDescription != null ? appSeoMetaDescription : 'Practice English listening with dictation exercises. Free online exercises for all levels.'}">
    <title th:text="${title + ' | ' + (appSiteName != null ? appSiteName : 'English Listening Practice')}">English Listening Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Prevent FOIT/FOUC for themes by setting data-theme synchronously -->
    <script>
        (function() {
            var savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
</html>
