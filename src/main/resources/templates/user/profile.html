<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/head :: head('My Profile')}"></div>
    <style>
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background-color: var(--bg-color, #ffffff);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            color: var(--text-color, #333333);
        }
        .profile-header {
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color, #eeeeee);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #4CAF50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-right: 20px;
            text-transform: uppercase;
        }
        .profile-info {
            flex-grow: 1;
        }
        .profile-info h2 {
            margin: 0 0 5px 0;
            font-size: 28px;
        }
        .profile-info p {
            margin: 0 0 10px 0;
            color: #666666;
            font-size: 16px;
        }
        .badge-role {
            background: #4CAF50;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .profile-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .detail-card {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eeeeee;
        }
        .detail-card strong {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666666;
            text-transform: uppercase;
        }
        .detail-card span {
            font-size: 18px;
            font-weight: 500;
        }
        
        .profile-actions {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }
        .btn-action {
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            text-align: center;
            transition: background-color 0.3s;
        }
        .btn-edit {
            background-color: #2196F3;
            color: white;
        }
        .btn-edit:hover { background-color: #1976D2; }
        .btn-logout {
            background-color: #f44336;
            color: white;
        }
        .btn-logout:hover { background-color: #d32f2f; }

        /* Dark mode overrides */
        body.dark-mode .profile-container {
            background-color: #2c2c2c;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        body.dark-mode .profile-header {
            border-bottom-color: #444444;
        }
        body.dark-mode .detail-card {
            background-color: #383838;
            border-color: #444444;
        }
        body.dark-mode .profile-info p, body.dark-mode .detail-card strong {
            color: #aaaaaa;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="profile-container">
        <div class="profile-header">
            <!-- Hiển thị thư mục Avatar URL nếu có, nếu không thì lấy chữ cái đầu của Username -->
            <div th:if="${user.avatarUrl != null}" style="margin-right: 20px;">
                <img th:src="${user.avatarUrl}" alt="Avatar" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
            </div>
            <div th:unless="${user.avatarUrl != null}" class="profile-avatar" th:text="${#strings.substring(user.username, 0, 1)}">U</div>
            
            <div class="profile-info">
                <h2 th:text="${user.username}">Username</h2>
                <p th:text="${user.email}">user@example.com</p>
                <span class="badge-role" th:text="${user.role}">USER</span>
            </div>
        </div>
        
        <div class="profile-details-grid">
            <div class="detail-card">
                <strong>Ngày tham gia</strong>
                <span th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}">...</span>
            </div>
            <div class="detail-card">
                <strong>Tổng thời gian học</strong>
                <span><span th:text="${user.totalActiveTime}">0</span> phút</span>
            </div>
            <div class="detail-card">
                <strong>Tài khoản liên kết</strong>
                <span th:text="${user.provider != null ? user.provider : 'Mật khẩu cục bộ (Email)'}">LOCAL</span>
            </div>
            <div class="detail-card">
                <strong>Trạng thái</strong>
                <span style="color: #4CAF50;">Đang Hạt Động</span>
            </div>
        </div>
        
        <div class="profile-actions">
            <a href="#" class="btn-action btn-edit">Chỉnh sửa thông tin</a>
            <a href="/logout" class="btn-action btn-logout">Đăng xuất</a>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
