<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/head :: head('My Comments')}"></div>
    <style>
        .my-comments-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background-color: var(--bg-color, #ffffff);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            color: var(--text-color, #333333);
        }
        .my-comments-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--primary, #e67300);
            padding-bottom: 12px;
        }
        .my-comment-card {
            background: var(--bg-card, #f9f9f9);
            border: 1px solid var(--border-color, #eee);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 14px;
            transition: box-shadow 0.2s;
        }
        .my-comment-card:hover {
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .my-comment-meta {
            font-size: 0.85rem;
            color: var(--text-secondary, #888);
            margin-bottom: 6px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .my-comment-meta a {
            color: var(--primary, #e67300);
            text-decoration: none;
            font-weight: 600;
        }
        .my-comment-meta a:hover { text-decoration: underline; }
        .my-comment-content {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-primary, #333);
        }
        .my-comment-votes {
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary, #888);
        }
        .empty-comments {
            text-align: center;
            color: var(--text-muted, #aaa);
            padding: 40px 0;
            font-size: 1.1rem;
        }

        /* Dark mode */
        body.dark-mode .my-comments-container {
            background-color: #2c2c2c;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        body.dark-mode .my-comment-card {
            background: #383838;
            border-color: #444;
        }
        body.dark-mode .my-comment-meta { color: #aaa; }
        body.dark-mode .my-comment-content { color: #ddd; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="my-comments-container">
        <h1 class="my-comments-title"><i class="fas fa-comments" style="margin-right:8px;"></i> My Comments</h1>

        <div th:if="${#lists.isEmpty(comments)}" class="empty-comments">
            Bạn chưa viết bình luận nào.
        </div>

        <div th:each="comment : ${comments}" class="my-comment-card">
            <div class="my-comment-meta">
                <span th:text="'📅 ' + ${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                <span th:if="${comment.sentence != null}">
                    tại câu: <strong th:text="${#strings.abbreviate(comment.sentence.content, 60)}"></strong>
                </span>
                <a th:if="${comment.sentence != null and comment.sentence.lesson != null}"
                   th:href="@{'/lesson/' + ${comment.sentence.lesson.id}}">
                    → Đi đến bài học
                </a>
            </div>
            <div class="my-comment-content" th:text="${comment.content}"></div>
            <div class="my-comment-votes">
                👍 <span th:text="${comment.likeCount}">0</span> &nbsp;&nbsp;
                👎 <span th:text="${comment.dislikeCount}">0</span>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
