<!DOCTYPE html>
<!-- GIAO DIỆN TRANG ĐẶT LẠI MẬT KHẨU -->
<!-- User nhập mật khẩu mới sau khi click link từ email -->

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Reset Password')}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="auth-container">
        <div class="auth-card">
            <h1>Đặt lại mật khẩu</h1>
            <p class="auth-description">Nhập mật khẩu mới cho tài khoản của bạn.</p>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/reset-password}" method="post" id="resetPasswordForm">
                <input type="hidden" name="token" th:value="${token}">

                <div class="form-group">
                    <label for="password">Mật khẩu mới</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Tối thiểu 6 ký tự" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                           placeholder="Nhập lại mật khẩu" required minlength="6">
                </div>

                <div id="passwordMismatch" class="alert alert-error" style="display: none;">
                    Mật khẩu xác nhận không khớp!
                </div>

                <button type="submit" class="btn-submit">Đặt lại mật khẩu</button>
            </form>

            <div class="auth-links">
                <p>Đã nhớ mật khẩu? <a th:href="@{/login}">Đăng nhập</a></p>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="/js/page/auth/resetpassword.js"></script>
</body>
</html>
