<!DOCTYPE html>
<!-- GIAO DIỆN TRANG ĐĂNG NHẬP -->
<!-- Cung cấp Form nhập Email và Mật khẩu (Dùng Spring Security nếu có sau này) -->

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="auth-container">
        <div class="auth-card">
            <h1>Login</h1>
            
            <a th:href="@{/oauth2/authorization/google}" class="btn-google" style="text-decoration:none; display:flex; align-items:center; justify-content:center;">
                <img th:src="@{/images/social_media/Googe.png}" alt="Google Logo" width="16" height="16" style="margin-right:8px;">
                Đăng nhập bằng Google
            </a>

            <div class="auth-divider">Or enter your password</div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" style="color: red; text-align: center; margin-bottom: 15px;" th:text="${error}"></div>
            <div th:if="${param.error}" style="color: red; text-align: center; margin-bottom: 15px;">
                Đăng nhập OAuth2 thất bại. Hãy kiểm tra lại cấu hình GOOGLE_CLIENT_ID và SECRET.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" class="form-control" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control">
                </div>
                <button type="submit" class="btn-submit">Submit</button>
            </form>

            <div class="auth-links">
                <p>Forgot your password? <a th:href="@{/forgot-password}">Click here</a></p>
                <p>Haven't had an account? <a th:href="@{/register}">Register here</a></p>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
