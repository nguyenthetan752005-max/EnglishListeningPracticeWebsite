<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="auth-container">
        <div class="auth-card">
            <h1>Login</h1>
            
            <button class="btn-google">
                <img th:src="@{/images/social_media/Googe.png}" alt="Google Logo" width="16" height="16">
                Đăng nhập bằng Google
            </button>

            <div class="auth-divider">Or enter your password</div>

            <form action="#" method="post">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" class="form-control" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control">
                </div>
                <button type="submit" class="btn-submit">Submit</button>
            </form>

            <div class="auth-links">
                <p>Forgot your password? <a href="#">Click here</a></p>
                <p>Haven't had an account? <a th:href="@{/register}">Register here</a></p>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
