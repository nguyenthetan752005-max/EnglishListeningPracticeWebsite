<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Create an account')}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="auth-container">
        <div class="auth-card">
            <h1>Create an account</h1>
            
            <button class="btn-google">
                <img th:src="@{/images/social_media/Googe.png}" alt="Google Logo" width="16" height="16">
                Đăng nhập bằng Google
            </button>

            <div class="auth-divider">Or enter your information</div>

            <form action="#" method="post">
                <div class="form-group">
                    <label for="nickname">Nickname</label>
                    <input type="text" id="nickname" name="nickname" class="form-control" autofocus>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control">
                </div>
                <button type="submit" class="btn-submit">Submit</button>
            </form>

            <div class="auth-links">
                <p>Had an account already? <a th:href="@{/login}">Login here</a></p>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
