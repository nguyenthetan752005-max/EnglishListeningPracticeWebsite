<!DOCTYPE html>
<!-- GIAO DIỆN TRANG QUÊN MẬT KHẨU -->
<!-- Cho phép user nhập email để nhận link đặt lại mật khẩu -->

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Forgot Password')}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="auth-container">
        <div class="auth-card">
            <h1>Quên mật khẩu</h1>
            <p class="auth-description">Nhập email đã đăng ký để nhận link đặt lại mật khẩu.</p>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control"
                           placeholder="example@gmail.com" required autofocus>
                </div>
                <button type="submit" class="btn-submit">Gửi link đặt lại mật khẩu</button>
            </form>

            <div class="auth-links">
                <p>Đã nhớ mật khẩu? <a th:href="@{/login}">Đăng nhập</a></p>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
