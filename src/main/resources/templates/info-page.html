<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main style="padding: 48px 20px 72px;">
    <section style="max-width: 900px; margin: 0 auto;">
        <div style="background: linear-gradient(135deg, #eff6ff, #ecfdf5); border: 1px solid #dbeafe; border-radius: 24px; padding: 32px;">
            <p style="margin: 0 0 12px; color: #2563eb; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;">Information</p>
            <h1 th:text="${pageHeading}" style="margin: 0 0 12px; font-size: clamp(2rem, 4vw, 3rem); color: #0f172a;">Information Page</h1>
            <p th:text="${pageLead}" style="margin: 0; font-size: 1.05rem; color: #334155; line-height: 1.7;">Page description</p>
        </div>

        <div style="display: grid; gap: 20px; margin-top: 28px;">
            <article th:each="section : ${sections}" style="background: #ffffff; border: 1px solid #e2e8f0; border-radius: 20px; padding: 24px;">
                <h2 th:text="${section.title}" style="margin: 0 0 14px; color: #0f172a; font-size: 1.25rem;">Section</h2>
                <ul style="margin: 0; padding-left: 20px; color: #475569; line-height: 1.8;">
                    <li th:each="item : ${section.items}" th:text="${item}">Item</li>
                </ul>
            </article>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
