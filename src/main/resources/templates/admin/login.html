<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | English Listening Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pages/admin-login.css}">
</head>
<body>
    <div class="admin-login-wrapper">
        <!-- Decorative background -->
        <div class="admin-bg-decoration">
            <div class="bg-circle bg-circle-1"></div>
            <div class="bg-circle bg-circle-2"></div>
            <div class="bg-circle bg-circle-3"></div>
        </div>

        <div class="admin-login-card">
            <!-- Header -->
            <div class="admin-login-header">
                <div class="admin-shield-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <h1>Admin Panel</h1>
                <p class="admin-subtitle">Đăng nhập để quản lý hệ thống</p>
            </div>

            <!-- Error message -->
            <div th:if="${error}" class="admin-error-msg">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <span th:text="${error}">Error message</span>
            </div>

            <!-- Login Form -->
            <form th:action="@{/admin/login}" method="post" class="admin-login-form">
                <div class="admin-form-group">
                    <label for="admin-username">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        Tài khoản
                    </label>
                    <input type="text" id="admin-username" name="username" placeholder="Nhập username hoặc email" autocomplete="username" autofocus required>
                </div>

                <div class="admin-form-group">
                    <label for="admin-password">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        Mật khẩu
                    </label>
                    <input type="password" id="admin-password" name="password" placeholder="Nhập mật khẩu" autocomplete="current-password" required>
                </div>

                <button type="submit" class="admin-login-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    Đăng nhập
                </button>
            </form>

            <!-- Footer -->
            <div class="admin-login-footer">
                <a href="/" class="admin-back-link">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Quay về trang chính
                </a>
            </div>
        </div>
    </div>
</body>
</html>
